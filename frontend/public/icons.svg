<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .bar {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      svg:hover .bar-1 { transform: scaleY(1.08); transition-delay: 0.00s; }
      svg:hover .bar-2 { transform: scaleY(1.08); transition-delay: 0.05s; }
      svg:hover .bar-3 { transform: scaleY(1.08); transition-delay: 0.10s; }
    </style>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="scan" x="0" y="0" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="#000" fill-opacity="0.15"/>
    </pattern>
    <clipPath id="tileMask">
      <rect x="2" y="2" width="60" height="60" rx="12"/>
    </clipPath>
    <filter id="barShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#tileGrad)"/>

  <g clip-path="url(#tileMask)">
    <g filter="url(#barShadow)">
      <polygon class="bar bar-1" points="14,46 24,42 24,54 14,54" fill="#f43f5e"/>
      <polygon class="bar bar-2" points="28,38 38,32 38,54 28,54" fill="#059669"/>
      <polygon class="bar bar-3" points="42,28 52,20 52,54 42,54" fill="#10b981"/>
    </g>
    <rect x="0" y="0" width="64" height="64" fill="url(#scan)" opacity="0.4"/>
  </g>
</svg>